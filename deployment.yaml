apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp

  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
      - name: myapp
        image: myapp:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
        livenessProbe:
          httpGet:
            path:  /health
            port:  3000
          initialDelaySeconds:  5
          periodSeconds:  10
        env:
        - name: APP_MESSAGE
          valueFrom:
            configMapKeyRef:
              name:  web-config
              key:  APP_MESSAGE
        - name:  DB_USER
          valueFrom:
            secretKeyRef:
              name:  db-secret
              key:  DB_USER
        - name:  DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name:  db-secret
              key:  DB_PASSWORD

        
      